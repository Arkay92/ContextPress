name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      use-api-token:
        description: "Use PYPI_API_TOKEN instead of trusted publishing"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    env:
      USE_PYPI_TOKEN: ${{ github.event_name == 'workflow_dispatch' && inputs.use-api-token }}
    environment:
      name: pypi
      url: https://pypi.org/p/contextpress
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build distributions
        run: python -m build

      - name: Publish distributions to PyPI with API token
        if: env.USE_PYPI_TOKEN == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish distributions to PyPI with trusted publishing
        if: env.USE_PYPI_TOKEN != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
